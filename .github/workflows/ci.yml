name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest
      - run: python scripts/validate-release.py
      - run: authorized-security-auditor validate-scope examples/sample-scope.yaml
      - run: authorized-security-auditor validate-finding examples/sample-finding.md
